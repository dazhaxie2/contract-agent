# contract-agent backend + frontend
# backend Service 必须保留 labels { app.kubernetes.io/name: contract-agent, app.kubernetes.io/component: backend }
# 以匹配 k8s/monitoring/servicemonitor.yaml 的 selector。
---
# ============== backend ==============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: contract-agent
  labels:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: contract-agent
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contract-agent
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: contract-agent
      # 禁用 K8s 自动注入 <SVC>_HOST / <SVC>_PORT env，否则 REDIS_PORT 会被覆盖成 tcp://...
      enableServiceLinks: false
      containers:
        - name: backend
          image: contract-agent-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000, name: http }
          env:
            - { name: TZ, value: Asia/Shanghai }
          envFrom:
            - configMapRef: { name: contract-agent-config }
            - secretRef: { name: contract-agent-secret }
          # health/ready 探针
          startupProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: "2", memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: contract-agent
  labels:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: backend
spec:
  ports:
    - { port: 8000, targetPort: http, name: http }
  selector:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: backend
---
# ============== frontend ==============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: contract-agent
  labels:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: contract-agent
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contract-agent
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: contract-agent-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 80, name: http }
          env:
            - { name: TZ, value: Asia/Shanghai }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 30m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx
            items:
              - { key: default.conf, path: default.conf }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: contract-agent
  labels:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  ports:
    - { port: 80, targetPort: http, nodePort: 30080, name: http }
  selector:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: frontend
