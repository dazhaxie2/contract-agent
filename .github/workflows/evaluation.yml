# ============================================
# Agent 质量自动化评估流水线
# 触发: 每日定时 / 手动触发 / PR到main分支
# ============================================

name: Agent Quality Evaluation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Test category filter"
        required: false
        default: ""
        type: string
      tenant_id:
        description: "Tenant ID for scoped evaluation"
        required: false
        default: "default"
  pull_request:
    branches: [main]
    paths:
      - "backend/app/agents/**"
      - "backend/app/rag/**"
      - "backend/tests/fixtures/evaluation_test_set.json"

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r backend/requirements.txt

      - name: Ruff lint
        run: cd backend && ruff check app/

      - name: Validate evaluation test set structure
        run: cd backend && python scripts/validate_evaluation_set.py

  evaluate:
    name: Agent Evaluation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run evaluation infrastructure tests
        run: cd backend && python -m pytest tests/test_evaluation_infra.py -v

      - name: Run evaluation test suite
        if: github.event_name != 'pull_request'
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          cd backend
          python -m scripts.run_evaluation \
            --tenant-id ${{ github.event.inputs.tenant_id || 'default' }} \
            ${{ github.event.inputs.category && format('--category {0}', github.event.inputs.category) || '' }} \
            --output evaluation_report.json

      - name: Check pass rate threshold
        if: github.event_name != 'pull_request'
        run: |
          cd backend
          python -c "
          import json, sys
          with open('evaluation_report.json', 'r') as f:
              report = json.load(f)

          pass_rate = report.get('pass_rate', 0)
          total = report.get('total', 0)
          passed = report.get('passed', 0)

          print(f'Test Results: {passed}/{total} passed ({pass_rate:.1%})')

          for r in report.get('results', []):
              status_icon = {'pass': '✅', 'partial': '⚠️', 'fail': '❌', 'error': '💥'}.get(r['status'], '?')
              print(f\"  {status_icon} {r['test_id']}: {r['status']} ({r.get('latency_ms', 0):.0f}ms)\")

          if pass_rate < 0.7:
              print(f'\n❌ Pass rate {pass_rate:.1%} is below 70% threshold')
              sys.exit(1)
          else:
              print(f'\n✅ Pass rate {pass_rate:.1%} meets threshold')
          " 2>/dev/null || echo "Evaluation report not found, skipping threshold check"

      - name: Run LLM-as-Judge batch scoring
        if: github.event_name != 'pull_request'
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          cd backend
          python -c "
          import asyncio, json
          from app.services.evaluation_service import evaluation_service
          from app.core.database import get_write_session

          async def run():
              async with get_write_session() as db:
                  result = await evaluation_service.batch_score(db, 'default', limit=20)
                  print(json.dumps(result, indent=2))
                  with open('judge_report.json', 'w') as f:
                      json.dump(result, f, indent=2)

          asyncio.run(run())
          " 2>/dev/null || echo "Judge scoring skipped (no DB connection in CI)"

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: agent-evaluation-reports
          path: |
            backend/evaluation_report.json
            backend/judge_report.json
        if: always()
        continue-on-error: true
