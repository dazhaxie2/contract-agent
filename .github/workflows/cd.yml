# ============================================
# 合同合规Agent系统 - CD流水线(生产部署)
# 触发: Release发布
# ============================================

name: CD Pipeline - Production

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ========== 生产镜像构建 ==========
  build-production:
    name: 构建生产镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 登录容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 构建后端生产镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: 构建前端生产镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ========== Helm部署到生产 ==========
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build-production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 安装Helm
        uses: azure/setup-helm@v3

      - name: 设置Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Helm部署
        run: |
          helm upgrade --install contract-agent ./helm/contract-agent \
            --namespace contract-agent \
            --create-namespace \
            --set backend.image.tag=${{ steps.version.outputs.VERSION }} \
            --set frontend.image.tag=${{ steps.version.outputs.VERSION }} \
            --set global.environment=production \
            --values helm/contract-agent/values-prod.yaml \
            --wait --timeout 600s

  # ========== 冒烟测试 ==========
  smoke-test:
    name: 生产冒烟测试
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - name: 健康检查
        run: |
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.contract-agent.example.com/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "健康检查通过"
              exit 0
            fi
            echo "等待服务就绪... ($i/10)"
            sleep 15
          done
          echo "健康检查失败"
          exit 1

  # ========== 通知 ==========
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always()
    steps:
      - name: 发送部署通知
        run: |
          STATUS="${{ needs.smoke-test.result }}"
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ 合同合规Agent v${VERSION} 生产部署成功"
          else
            echo "❌ 合同合规Agent v${VERSION} 生产部署失败，请检查"
          fi
