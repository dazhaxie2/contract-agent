# mypy 配置（存量项目渐进引入）
#
# 现状：`mypy app/` 已清零（0 errors），CI 中类型检查已移除 continue-on-error，
# 成为阻断合并的硬门禁。后续可在保持零错误的前提下逐步收紧，例如：
#   - warn_unused_ignores：清理无效的 type: ignore（注意对可选依赖回退处的环境敏感性）
#   - check_untyped_defs：检查未标注函数体（会暴露新的待修项）
#   - disallow_untyped_defs：要求函数签名补全标注（改动面大）
# 每收紧一项都应先本地复核 `mypy app/` 仍为 0，再提交。
[mypy]
python_version = 3.12
ignore_missing_imports = True
show_error_codes = True

# python-dateutil 为已锁定的运行时依赖但无随包类型信息；项目不引入额外的
# types-python-dateutil 桩（避免 CI/本地额外安装步骤），按惯用方式精确忽略其缺桩。
# 注：全局 ignore_missing_imports 不覆盖 import-untyped，per-module 才生效。
[mypy-dateutil.*]
ignore_missing_imports = True
