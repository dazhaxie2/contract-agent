# mypy 配置（存量项目渐进引入）
#
# 第一阶段：宽松基线，配合 ci.yml 中 `continue-on-error: true` 先观察、不阻断合并。
# 当前 `mypy app/` 存在数十处已知类型问题（以实际输出为准），属技术债，建议分批清理。
# 待清零后，可逐步收紧（开启 check_untyped_defs / disallow_untyped_defs / warn_unused_ignores）
# 并移除 ci.yml 里的 continue-on-error，使类型检查成为硬门禁。
[mypy]
python_version = 3.12
ignore_missing_imports = True
show_error_codes = True
