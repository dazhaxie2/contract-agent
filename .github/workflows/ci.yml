name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  HIDB_TEST_IMAGE: postgres:16

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            working-directory: backend
          - name: frontend
            working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.name == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Ruff
        if: matrix.name == 'backend'
        working-directory: ${{ matrix.working-directory }}
        run: pip install ruff && ruff check .

      - name: Setup Node
        if: matrix.name == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Frontend Lint
        if: matrix.name == 'frontend'
        working-directory: ${{ matrix.working-directory }}
        run: npm ci && npm run lint
        continue-on-error: true

  test-backend:
    name: Backend Tests (HiDB + Alembic)
    runs-on: ubuntu-latest
    services:
      hidb:
        image: ${{ env.HIDB_TEST_IMAGE }}
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: hidb
          POSTGRES_PASSWORD: hidb123
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hidb -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_PROVIDER: hidb_pg
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: hidb
      DB_PASSWORD: hidb123
      DB_NAME: test_db
      DB_READ_TARGET: hidb
      DB_DUAL_WRITE_ENABLED: "false"
      DB_AUTO_CREATE_SCHEMA: "false"
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Alembic Upgrade Head
        working-directory: backend
        run: alembic upgrade head

      - name: Alembic Current Revision Check
        working-directory: backend
        run: alembic current

      - name: API Regression Tests
        working-directory: backend
        run: python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "0"

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          kubectl apply -k .

      - name: Wait for Rollout
        run: |
          kubectl -n contract-agent-staging rollout status deployment/backend --timeout=300s
          kubectl -n contract-agent-staging rollout status deployment/frontend --timeout=120s

      - name: Health Check
        run: |
          sleep 10
          kubectl -n contract-agent-staging exec deploy/backend -- curl -sf http://localhost:8000/health
