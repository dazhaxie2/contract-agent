metadata:
  name: backend
  namespace: contract-agent
  labels:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: contract-agent
    app.kubernetes.io/component: backend
