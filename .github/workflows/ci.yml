# ============================================
# 合同合规Agent系统 - CI流水线
# 触发: push/PR到main/develop
# ============================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ========== 代码检查 ==========
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            working-directory: backend
          - name: frontend
            working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Python Lint (后端)
        if: matrix.name == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff && ruff check .
        if: matrix.name == 'backend'
        working-directory: ${{ matrix.working-directory }}

      - name: Node Lint (前端)
        if: matrix.name == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci && npm run lint
        if: matrix.name == 'frontend'
        working-directory: ${{ matrix.working-directory }}
        continue-on-error: true

  # ========== 后端测试 ==========
  test-backend:
    name: 后端测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: 安装依赖
        working-directory: backend
        run: pip install -r requirements.txt
      - name: 运行测试
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: 上传覆盖率
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  # ========== 安全扫描 ==========
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "0"  # 不阻断，仅报告

  # ========== 构建镜像 ==========
  build-images:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 登录容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 部署Staging ==========
  deploy-staging:
    name: 部署到Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: 配置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 设置Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: 部署到Staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          kubectl apply -k .

      - name: 等待部署完成
        run: |
          kubectl -n contract-agent-staging rollout status deployment/backend --timeout=300s
          kubectl -n contract-agent-staging rollout status deployment/frontend --timeout=120s

      - name: 健康检查
        run: |
          sleep 10
          kubectl -n contract-agent-staging exec deploy/backend -- curl -sf http://localhost:8000/health
